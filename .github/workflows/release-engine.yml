name: release-engine

# Build the engine binary on GitHub and attach it to the matching Release.
# Trigger it either way:
#   * push a tag  v1, v2, v3 …            -> builds THAT tagged commit, publishes its release
#   * Actions -> release-engine -> Run    -> rebuild/republish an existing tag by name
# The nodes download these assets (tnl-engine-linux-<arch> + .sha256) from the
# panel's engine-update button; nothing is committed to the repo tree.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build and release, e.g. v1'
        required: true

permissions:
  contents: write        # needed to create/upload releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Pick the tag
        id: t
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Check out the tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.t.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build linux amd64 + arm64
        run: |
          set -eux
          mkdir -p out
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w" -o "out/tnl-engine-linux-$arch" .
            ( cd out && sha256sum "tnl-engine-linux-$arch" > "tnl-engine-linux-$arch.sha256" )
          done
          ls -l out

      - name: Publish assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          TAG="${{ steps.t.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" out/* --clobber
          else
            gh release create "$TAG" --title "$TAG" --notes "tnl-engine $TAG" out/*
          fi
